name: Build & Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake patchelf python3 python3-pip curl

      - name: Download external libraries
        run: |
          chmod +x ./download-ext-libs.sh
          ./download-ext-libs.sh

      - name: Build
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGING="ov-prompter-${VERSION}"
          mkdir -p "$STAGING"
          cp build/ov-prompter "$STAGING/"
          cp -a libs "$STAGING/"
          cp src/ov-prompter.1 "$STAGING/"
          tar czf "ov-prompter-${VERSION}-linux-x86_64.tar.gz" "$STAGING"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ov-prompter-*-linux-x86_64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
