name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake patchelf

      - name: Build
        run: ./build.sh

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING="openvino-prompter-${VERSION}"
          mkdir -p "$STAGING"
          cp build/prompter "$STAGING/"
          cp -a libs "$STAGING/"
          cp README.md run-prompter.sh "$STAGING/"
          tar czf "openvino-prompter-${VERSION}-linux-x86_64.tar.gz" "$STAGING"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: openvino-prompter-*-linux-x86_64.tar.gz
          generate_release_notes: true
